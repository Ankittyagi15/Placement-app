services:
  - type: web
    name: placement-backend
    env: docker
    branch: main
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /
    region: oregon
    plan: free

  - type: static
    name: placement-frontend
    env: static
    branch: main
    buildCommand: "cd frontend && npm ci && npm run build"
    publishPath: frontend/dist
    region: oregon
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://placement-backend.onrender.com
