services:
  - type: web
    name: placement-backend
    env: java
    plan: free
    javaVersion: 21
    buildCommand: "cd backend && mvn clean package -DskipTests -B"
    startCommand: "cd backend && java -jar target/placement-prep-portal-1.0.0.jar"
    envVars:
      - key: PORT
        value: 8080

  - type: web
    name: placement-frontend
    env: node
    plan: free
    nodeVersion: 21
    buildCommand: "cd frontend && npm install && npm run build && npm install -g serve"
    startCommand: "cd frontend && serve -s dist -l 3000"
    envVars:
      - key: VITE_API_URL
        fromService:
          name: placement-backend
          property: renderURL
